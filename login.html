<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOIM 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <script src="login.js" defer></script>
  </head>
  <body>
    <main class="login-page">
      <!-- 메인과 역할이 다른 화면이라 로그인은 별도 페이지로 분리해 둔다 -->
      <section class="login-stage">
        <div class="visual-panel" aria-hidden="true">
          <img src="assets/login-hero.png" alt="" />
        </div>

        <!-- 실제 인증 전 단계라서, 지금은 입력 흐름과 화면 구조를 먼저 확인하는 데모 영역이다 -->
        <section class="form-stage" aria-labelledby="loginTitle">
          <div class="panel-shell">
            <div class="login-card">
              <a class="back-link" href="index.html">프로젝트 홈으로</a>

              <div class="brand-row">
                <span class="brand-orb"></span>
                <strong>모임</strong>
              </div>

              <header class="card-header">
                <h1 id="loginTitle">다시 만나 반가워요</h1>
              </header>

              <form class="login-form" id="loginForm">
                <label class="field-group">
                  <span>로그인 정보</span>
                  <input
                    type="text"
                    name="identifier"
                    placeholder="이메일 또는 전화번호"
                    required
                  />
                </label>

                <label class="field-group">
                  <span>비밀번호</span>
                  <span class="password-shell">
                    <input
                      id="passwordInput"
                      type="password"
                      name="password"
                      placeholder="비밀번호를 입력하세요"
                      required
                    />
                    <button
                      class="icon-button"
                      id="togglePasswordButton"
                      type="button"
                      aria-label="비밀번호 보기"
                    >
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M12 5C6.5 5 2.1 8.5 1 12c1.1 3.5 5.5 7 11 7s9.9-3.5 11-7c-1.1-3.5-5.5-7-11-7Zm0 11a4 4 0 1 1 0-8 4 4 0 0 1 0 8Z"
                        />
                        <circle cx="12" cy="12" r="2.1" />
                      </svg>
                    </button>
                  </span>
                </label>

                <div class="support-row">
                  <label class="remember-toggle">
                    <input id="rememberInput" type="checkbox" name="remember" />
                    <span class="toggle-ui"></span>
                    <span>로그인 상태 유지</span>
                  </label>

                  <a href="#" class="support-link">비밀번호를 잊으셨나요?</a>
                </div>

                <button class="primary-submit" type="submit">로그인</button>
              </form>

              <p class="login-message" id="loginMessage" aria-live="polite"></p>

              <div class="divider" aria-hidden="true"></div>

              <button class="google-button" id="googleButton" type="button">
                <span class="google-mark">G</span>
                <span>또는 구글로 로그인</span>
              </button>

              <p class="signup-row">
                <span>아직 계정이 없으신가요?</span>
                <a href="#">회원가입하기</a>
              </p>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
